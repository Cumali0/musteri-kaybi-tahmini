name: CI

# Her push ve pull request'te otomatik çalışır.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur
        # Testler sadece modeli yükleyip tahmin yapar; bu yüzden ağır paketleri
        # (shap, streamlit) değil, yalnızca gerekenleri kuruyoruz -> CI hızlı kalır.
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn xgboost joblib pytest

      - name: Testleri çalıştır
        run: pytest -v
